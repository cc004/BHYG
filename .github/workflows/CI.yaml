name: CI

on:
  push:
    tags:
      - "*"
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # os: [windows-latest, ubuntu-22.04, macos-15-intel, macos-latest]
        # os: [windows-latest, ubuntu-latest, macos-15-intel, macos-latest, windows-11-arm]
        os: [windows-latest]
        include:
          - os: windows-latest
            build: BHYG-Windows.exe
            bdist_client: OSS-Windows
          # - os: ubuntu-22.04
          #   build: BHYG-Linux
          #   bdist_client: OSS-Linux
          # - os: macos-15-intel
          #   build: BHYG-macOS-Intel.bin
          #   bdist_client: OSS-Mac(Intel)
          # - os: macos-latest
          #   build: BHYG-macOS-Apple_Silicon.bin
          #   bdist_client: OSS-Mac
          # - os: windows-11-arm
          #   build: BHYG-Windows-arm.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from commit hash
        id: vars
        shell: bash
        run: |
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: "pip"
          cache-dependency-path: |
            requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: PyInstaller Build
        shell: bash
        run: |
          set -euo pipefail

          OUT_NAME="${{ steps.vars.outputs.short_sha }}-${{ matrix.build }}"
          PYI_NAME="${OUT_NAME%.exe}"

          DATA_SEP=":"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            DATA_SEP=";"
          fi

          pyinstaller \
            --clean \
            --noconfirm \
            --onefile \
            --name "$PYI_NAME" \
            --add-data "locale${DATA_SEP}locale" \
            --collect-submodules sentry_sdk.integrations \
            loader.py

          mkdir -p build

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv "dist/${PYI_NAME}.exe" "build/${OUT_NAME}"
          else
            mv "dist/${PYI_NAME}" "build/${OUT_NAME}"
          fi

      - name: Add executable attr
        run: chmod +x build/*
        if: matrix.os != 'windows-latest'

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: build/${{ steps.vars.outputs.short_sha }}-${{ matrix.build }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ steps.vars.outputs.short_sha }}-${{ matrix.build }}
          tag_name: commit-${{ steps.vars.outputs.full_sha }}
          name: ${{ steps.vars.outputs.short_sha }}
          target_commitish: ${{ steps.vars.outputs.full_sha }}